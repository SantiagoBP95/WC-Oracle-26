<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#070f1c"/>
      <stop offset="100%" style="stop-color:#0d1829"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#059669;stop-opacity:0.05"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow circles -->
  <circle cx="200" cy="150" r="280" fill="#34d399" opacity="0.07" filter="url(#blur1)"/>
  <circle cx="1050" cy="480" r="220" fill="#059669" opacity="0.08" filter="url(#blur2)"/>

  <!-- Grid lines subtle -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#1f2c47" stroke-width="1" opacity="0.5"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#1f2c47" stroke-width="1" opacity="0.5"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#1f2c47" stroke-width="1" opacity="0.5"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#1f2c47" stroke-width="1" opacity="0.5"/>

  <!-- Top badge -->
  <rect x="80" y="60" width="220" height="32" rx="16" fill="#34d399" opacity="0.15"/>
  <rect x="80" y="60" width="220" height="32" rx="16" fill="none" stroke="#34d399" stroke-width="1" opacity="0.4"/>
  <text x="190" y="81" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#34d399" text-anchor="middle" letter-spacing="2">IA · ESTADÍSTICA · DATOS</text>

  <!-- Main title -->
  <text x="80" y="175" font-family="system-ui,sans-serif" font-size="78" font-weight="900" fill="#ffffff" letter-spacing="-2">WC Oracle</text>
  <text x="80" y="255" font-family="system-ui,sans-serif" font-size="78" font-weight="900" fill="#34d399" letter-spacing="-2">2026</text>

  <!-- Subtitle -->
  <text x="80" y="310" font-family="system-ui,sans-serif" font-size="22" fill="#94a3b8" font-weight="400">Predicciones del Mundial FIFA con Inteligencia Artificial</text>

  <!-- Divider -->
  <line x1="80" y1="345" x2="520" y2="345" stroke="#1f2c47" stroke-width="1.5"/>

  <!-- Feature pills row -->
  <!-- Pill 1 -->
  <rect x="80" y="365" width="150" height="36" rx="18" fill="#0d1829" stroke="#1f2c47" stroke-width="1.5"/>
  <text x="155" y="388" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">📊 Dashboard</text>
  <!-- Pill 2 -->
  <rect x="244" y="365" width="130" height="36" rx="18" fill="#0d1829" stroke="#1f2c47" stroke-width="1.5"/>
  <text x="309" y="388" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">⚽ Bracket</text>
  <!-- Pill 3 -->
  <rect x="388" y="365" width="160" height="36" rx="18" fill="#0d1829" stroke="#1f2c47" stroke-width="1.5"/>
  <text x="468" y="388" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">🎯 Apuestas</text>
  <!-- Pill 4 -->
  <rect x="562" y="365" width="160" height="36" rx="18" fill="#0d1829" stroke="#1f2c47" stroke-width="1.5"/>
  <text x="642" y="388" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">📈 Rendimiento</text>

  <!-- Stat row -->
  <text x="80" y="450" font-family="system-ui,sans-serif" font-size="13" fill="#475569" font-weight="600" letter-spacing="1">TORNEO 2026</text>

  <text x="80" y="490" font-family="system-ui,sans-serif" font-size="42" font-weight="800" fill="#34d399">48</text>
  <text x="80" y="515" font-family="system-ui,sans-serif" font-size="13" fill="#64748b">equipos</text>

  <text x="210" y="490" font-family="system-ui,sans-serif" font-size="42" font-weight="800" fill="#34d399">104</text>
  <text x="210" y="515" font-family="system-ui,sans-serif" font-size="13" fill="#64748b">partidos</text>

  <text x="360" y="490" font-family="system-ui,sans-serif" font-size="42" font-weight="800" fill="#34d399">10k+</text>
  <text x="360" y="515" font-family="system-ui,sans-serif" font-size="13" fill="#64748b">simulaciones</text>

  <text x="520" y="490" font-family="system-ui,sans-serif" font-size="42" font-weight="800" fill="#34d399">Dixon-Coles</text>
  <text x="520" y="515" font-family="system-ui,sans-serif" font-size="13" fill="#64748b">modelo probabilístico</text>

  <!-- Right side panel: Prediction card mockup -->
  <rect x="780" y="80" width="340" height="480" rx="16" fill="#0d1829" stroke="#1f2c47" stroke-width="1.5"/>

  <!-- Card header -->
  <rect x="780" y="80" width="340" height="56" rx="16" fill="#111f38"/>
  <rect x="780" y="114" width="340" height="22" fill="#111f38"/>
  <text x="950" y="115" font-family="system-ui,sans-serif" font-size="11" fill="#64748b" text-anchor="middle" letter-spacing="1">GRUPO F · FASE DE GRUPOS</text>

  <!-- Teams -->
  <text x="870" y="185" font-family="system-ui,sans-serif" font-size="26" font-weight="800" fill="#f1f5f9" text-anchor="middle">Brasil</text>
  <text x="950" y="185" font-family="system-ui,sans-serif" font-size="18" fill="#475569" text-anchor="middle">vs</text>
  <text x="1030" y="185" font-family="system-ui,sans-serif" font-size="26" font-weight="800" fill="#f1f5f9" text-anchor="middle">Marruecos</text>

  <!-- Expected goals -->
  <text x="950" y="215" font-family="system-ui,sans-serif" font-size="12" fill="#475569" text-anchor="middle">1.4 – 0.9 goles esperados</text>

  <!-- Divider -->
  <line x1="800" y1="235" x2="1100" y2="235" stroke="#1f2c47" stroke-width="1"/>

  <!-- 1X2 pills -->
  <rect x="800" y="250" width="90" height="60" rx="10" fill="#0c2240"/>
  <text x="845" y="276" font-family="system-ui,sans-serif" font-size="20" font-weight="800" fill="#38bdf8" text-anchor="middle">41%</text>
  <text x="845" y="296" font-family="system-ui,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Brasil</text>

  <rect x="905" y="250" width="90" height="60" rx="10" fill="#1a2535"/>
  <text x="950" y="276" font-family="system-ui,sans-serif" font-size="20" font-weight="800" fill="#e2e8f0" text-anchor="middle">30%</text>
  <text x="950" y="296" font-family="system-ui,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Empate</text>

  <rect x="1010" y="250" width="90" height="60" rx="10" fill="#1a2535"/>
  <text x="1055" y="276" font-family="system-ui,sans-serif" font-size="20" font-weight="800" fill="#fbbf24" text-anchor="middle">29%</text>
  <text x="1055" y="296" font-family="system-ui,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Marruecos</text>

  <!-- Divider -->
  <line x1="800" y1="325" x2="1100" y2="325" stroke="#1f2c47" stroke-width="1"/>

  <!-- Scoreline label -->
  <text x="800" y="350" font-family="system-ui,sans-serif" font-size="11" fill="#475569" letter-spacing="1">MÁS PROBABLE</text>

  <!-- Scoreline result correct badge -->
  <rect x="800" y="362" width="295" height="56" rx="10" fill="#022c22" stroke="#34d399" stroke-width="1.5"/>
  <text x="870" y="395" font-family="system-ui,sans-serif" font-size="32" font-weight="900" fill="#34d399" text-anchor="middle">1 – 1</text>
  <rect x="980" y="373" width="100" height="32" rx="16" fill="#34d399"/>
  <text x="1030" y="393" font-family="system-ui,sans-serif" font-size="12" font-weight="800" fill="#022c22" text-anchor="middle">✓ CORRECTO</text>

  <!-- Result actual -->
  <text x="800" y="445" font-family="system-ui,sans-serif" font-size="12" fill="#475569">Resultado real:</text>
  <text x="900" y="445" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#e2e8f0">Brasil 1 – 1 Marruecos</text>

  <!-- Markets teaser -->
  <line x1="800" y1="465" x2="1100" y2="465" stroke="#1f2c47" stroke-width="1"/>
  <text x="800" y="490" font-family="system-ui,sans-serif" font-size="11" fill="#475569" letter-spacing="1">MERCADOS DE APUESTA</text>
  <text x="800" y="512" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">Córners · Tarjetas · Tiros · Jugadores…</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#0d1829"/>
  <text x="600" y="613" font-family="system-ui,sans-serif" font-size="11" fill="#334155" text-anchor="middle">Aplicación independiente de análisis estadístico · Solo uso educativo y de referencia · No afiliada a la FIFA</text>
</svg>
