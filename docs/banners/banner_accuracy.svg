<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#070f1c"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="50"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Background glows -->
  <ellipse cx="600" cy="315" rx="500" ry="300" fill="#34d399" opacity="0.04" filter="url(#glow)"/>
  <ellipse cx="100" cy="100" rx="200" ry="200" fill="#059669" opacity="0.08" filter="url(#glow)"/>

  <!-- Top label -->
  <rect x="450" y="50" width="300" height="30" rx="15" fill="#022c22" stroke="#34d399" stroke-width="1"/>
  <text x="600" y="70" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#34d399" text-anchor="middle" letter-spacing="2">RESULTADOS DEL MODELO</text>

  <!-- Main headline -->
  <text x="600" y="150" font-family="system-ui,sans-serif" font-size="58" font-weight="900" fill="#f1f5f9" text-anchor="middle">El modelo que predijo</text>
  <text x="600" y="222" font-family="system-ui,sans-serif" font-size="72" font-weight="900" fill="#34d399" text-anchor="middle">Brasil 1–1 Marruecos</text>
  <text x="600" y="280" font-family="system-ui,sans-serif" font-size="32" fill="#64748b" text-anchor="middle">marcador exacto · antes del partido</text>

  <!-- Divider -->
  <line x1="200" y1="310" x2="1000" y2="310" stroke="#1f2c47" stroke-width="1.5"/>

  <!-- Stats row -->
  <!-- Stat 1 -->
  <text x="250" y="380" font-family="system-ui,sans-serif" font-size="64" font-weight="900" fill="#34d399" text-anchor="middle">Dixon</text>
  <text x="250" y="415" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="#34d399" text-anchor="middle">-Coles</text>
  <text x="250" y="445" font-family="system-ui,sans-serif" font-size="13" fill="#475569" text-anchor="middle">modelo estadístico</text>

  <!-- Separator -->
  <line x1="450" y1="340" x2="450" y2="480" stroke="#1f2c47" stroke-width="1.5"/>

  <!-- Stat 2 -->
  <text x="600" y="390" font-family="system-ui,sans-serif" font-size="72" font-weight="900" fill="#34d399" text-anchor="middle">10k+</text>
  <text x="600" y="445" font-family="system-ui,sans-serif" font-size="13" fill="#475569" text-anchor="middle">simulaciones Monte Carlo por torneo</text>

  <!-- Separator -->
  <line x1="750" y1="340" x2="750" y2="480" stroke="#1f2c47" stroke-width="1.5"/>

  <!-- Stat 3 -->
  <text x="950" y="380" font-family="system-ui,sans-serif" font-size="64" font-weight="900" fill="#34d399" text-anchor="middle">48</text>
  <text x="950" y="415" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="#34d399" text-anchor="middle">equipos</text>
  <text x="950" y="445" font-family="system-ui,sans-serif" font-size="13" fill="#475569" text-anchor="middle">clasificados al Mundial 2026</text>

  <!-- Bottom CTA -->
  <rect x="350" y="510" width="500" height="60" rx="30" fill="#34d399"/>
  <text x="600" y="545" font-family="system-ui,sans-serif" font-size="22" font-weight="800" fill="#022c22" text-anchor="middle">WC Oracle 2026 · Plan Pro</text>
  <text x="600" y="563" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#064e3b" text-anchor="middle">Accede a todas las predicciones →</text>

  <!-- Corner badge -->
  <text x="1130" y="55" font-family="system-ui,sans-serif" font-size="42" text-anchor="middle">⚽</text>
  <text x="1130" y="80" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#34d399" text-anchor="middle">WC ORACLE</text>

  <!-- Bottom disclaimer -->
  <text x="600" y="618" font-family="system-ui,sans-serif" font-size="10" fill="#1e293b" text-anchor="middle">Solo uso educativo · No afiliado a la FIFA</text>
</svg>
